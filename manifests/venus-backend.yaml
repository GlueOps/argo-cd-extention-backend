apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-extension-backend-api
  namespace: glueops-core
  labels:
    app.kubernetes.io/name: argocd-extension-backend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-extension-backend-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-extension-backend-api
    spec:
      containers:
        - name: argocd-extension-backend-api
          image: ghcr.io/glueops/argocd-extension-backend-api:v.0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: PROMETHEUS_BASE_URL
              value: "http://kps-prometheus.glueops-core-kube-prometheus-stack.svc.cluster.local:9090"
            - name: TEMPO_BASE_URL
              value: ""
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-extension-backend-api
  namespace: glueops-core
  labels:
    app.kubernetes.io/name: argocd-extension-backend-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: argocd-extension-backend-api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP